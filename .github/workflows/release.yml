name: Release

on:
  push:
    tags:
      - 'v*.*.*'    # Triggers on version tags: v1.0.0, v1.2.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # Outputs to dist/ at repo root (configured in vite.config.js)

      - name: Package release
        run: |
          VERSION=${GITHUB_REF_NAME}

          mkdir -p staging/backend
          cp install.sh staging/
          cp -r deploy staging/
          cp -r backend/* staging/backend/
          cp backend/spud-cli staging/
          cp backend/ssh-banner staging/
          cp backend/motd staging/
          cp backend/update.py staging/
          cp backend/run-update.sh staging/
          cp dist/index.html staging/
          if [ -d dist/assets ]; then
            cp -r dist/assets staging/
          fi

          # Write version file so the updater knows what's installed
          echo "${VERSION#v}" > staging/VERSION

          # Generate SHA256 checksum of the tarball
          tar -czf spud-router-${VERSION}.tar.gz -C staging .
          sha256sum spud-router-${VERSION}.tar.gz | awk '{print $1}' > spud-router-${VERSION}.sha256

          echo "Packaged: spud-router-${VERSION}.tar.gz"
          echo "Contents:"
          tar -tzf spud-router-${VERSION}.tar.gz

      - name: Assemble release notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VER="${VERSION#v}"

          # Curated "What's new" summary: the matching version section from
          # CHANGELOG.md (everything between "## [<ver>]" and the next "## [").
          CURATED=""
          if [ -f CHANGELOG.md ]; then
            CURATED=$(awk -v ver="$VER" '
              $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
              /^## \[/ && flag { flag=0 }
              flag { print }
            ' CHANGELOG.md)
          fi

          # Auto-generated "What's Changed" (PR list + Full Changelog link),
          # diffed against the previous tag by the GitHub API.
          AUTO=$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="${VERSION}" --jq .body 2>/dev/null || true)

          {
            if [ -n "$CURATED" ]; then
              echo "## What's new in ${VERSION}"
              echo
              echo "$CURATED"
              echo
            fi
            if [ -n "$AUTO" ]; then
              echo "$AUTO"
              echo
            fi
            echo "## Install"
            echo
            echo '```bash'
            echo "curl -L https://github.com/${REPO}/releases/download/${VERSION}/spud-router-${VERSION}.tar.gz | tar xz"
            echo "sudo bash install.sh"
            echo '```'
            echo
            echo "See [README](https://github.com/${REPO}/blob/main/README.md) for full instructions."
          } > release-body.md

          echo "----- assembled release body -----"
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "spud-router ${{ github.ref_name }}"
          body_path: release-body.md
          files: |
            spud-router-${{ github.ref_name }}.tar.gz
            spud-router-${{ github.ref_name }}.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease