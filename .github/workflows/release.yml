name: Release

on:
  push:
    tags:
      - 'v*.*.*'    # Triggers on version tags: v1.0.0, v1.2.3, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # Outputs to dist/ at repo root (configured in vite.config.js)

      - name: Package release
        run: |
          VERSION=${GITHUB_REF_NAME}

          mkdir -p staging/backend
          cp install.sh staging/
          cp -r backend/* staging/backend/
          cp backend/spud-cli staging/
          cp backend/ssh-banner staging/
          cp backend/motd staging/
          cp dist/index.html staging/
          if [ -d dist/assets ]; then
            cp -r dist/assets staging/
          fi

          # Write version file so the updater knows what's installed
          echo "${VERSION#v}" > staging/VERSION

          # Generate SHA256 checksum of the tarball
          tar -czf spud-router-${VERSION}.tar.gz -C staging .
          sha256sum spud-router-${VERSION}.tar.gz | awk '{print $1}' > spud-router-${VERSION}.sha256

          echo "Packaged: spud-router-${VERSION}.tar.gz"
          echo "Contents:"
          tar -tzf spud-router-${VERSION}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "spud-router ${{ github.ref_name }}"
          body: |
            ## Install

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/spud-router-${{ github.ref_name }}.tar.gz | tar xz
            sudo bash install.sh
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full instructions.
          files: |
            spud-router-${{ github.ref_name }}.tar.gz
            spud-router-${{ github.ref_name }}.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease